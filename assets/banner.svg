<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1280 640" width="1280" height="640">
  <defs>
    <pattern id="dots" x="0" y="0" width="24" height="24" patternUnits="userSpaceOnUse">
      <circle cx="1" cy="1" r="1" fill="#475569" opacity="0.35"/>
    </pattern>
    <linearGradient id="accentGrad" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#3b82f6"/>
      <stop offset="100%" stop-color="#60a5fa"/>
    </linearGradient>
    <linearGradient id="avatarGrad" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#3b82f6"/>
      <stop offset="100%" stop-color="#1d4ed8"/>
    </linearGradient>
    <clipPath id="cardClip">
      <rect x="680" y="72" width="540" height="500" rx="14"/>
    </clipPath>
  </defs>

  <!-- Background -->
  <rect width="1280" height="640" fill="#0f172a"/>
  <rect width="1280" height="640" fill="url(#dots)"/>

  <!-- Top accent bar -->
  <rect width="1280" height="3" fill="url(#accentGrad)"/>

  <!-- ── LEFT PANEL ── -->

  <!-- Category label -->
  <text x="60" y="88" font-family="system-ui,-apple-system,sans-serif" font-size="11" font-weight="700" fill="#3b82f6" letter-spacing="3" text-transform="uppercase">DEEP RESEARCH POST ENGINE</text>

  <!-- Main headline -->
  <text x="60" y="152" font-family="system-ui,-apple-system,sans-serif" font-size="52" font-weight="800" fill="#f1f5f9">Research real topics.</text>
  <text x="60" y="216" font-family="system-ui,-apple-system,sans-serif" font-size="52" font-weight="800" fill="#f1f5f9">Write posts that sound</text>
  <text x="60" y="280" font-family="system-ui,-apple-system,sans-serif" font-size="52" font-weight="800" fill="#f1f5f9">like <tspan fill="#3b82f6">you</tspan>.</text>

  <!-- Subtitle -->
  <text x="60" y="330" font-family="system-ui,-apple-system,sans-serif" font-size="18" fill="#94a3b8">No AI fluff. No fake stats. No generic writing.</text>
  <text x="60" y="358" font-family="system-ui,-apple-system,sans-serif" font-size="18" fill="#94a3b8">Just ask Claude in plain English — no coding needed.</text>

  <!-- Stat pills -->
  <rect x="60" y="385" width="140" height="34" rx="17" fill="#1e293b" stroke="#334155" stroke-width="1"/>
  <text x="130" y="407" font-family="system-ui,-apple-system,sans-serif" font-size="13" fill="#f1f5f9" text-anchor="middle">7 articles read</text>

  <rect x="212" y="385" width="148" height="34" rx="17" fill="#1e293b" stroke="#334155" stroke-width="1"/>
  <text x="286" y="407" font-family="system-ui,-apple-system,sans-serif" font-size="13" fill="#f1f5f9" text-anchor="middle">0/10 slop score</text>

  <rect x="372" y="385" width="158" height="34" rx="17" fill="#1e293b" stroke="#334155" stroke-width="1"/>
  <text x="451" y="407" font-family="system-ui,-apple-system,sans-serif" font-size="13" fill="#f1f5f9" text-anchor="middle">94% voice match</text>

  <!-- Framework line -->
  <text x="60" y="470" font-family="system-ui,-apple-system,sans-serif" font-size="12" fill="#475569">Built on</text>
  <text x="109" y="470" font-family="system-ui,-apple-system,sans-serif" font-size="12" fill="#64748b">AIDA · PAS · Hook Formula Library · LinkedIn 2026 Algorithm · Anti-Slop Filter</text>

  <!-- ── RIGHT PANEL — LinkedIn Post Card ── -->
  <rect x="680" y="72" width="540" height="500" rx="14" fill="#1e293b" stroke="#334155" stroke-width="1"/>

  <!-- Card inner header -->
  <rect x="680" y="72" width="540" height="48" rx="0" fill="#172033"/>
  <rect x="680" y="72" width="540" height="14" rx="14" fill="#172033"/>
  <rect x="680" y="100" width="540" height="20" fill="#172033"/>
  <text x="700" y="103" font-family="system-ui,-apple-system,sans-serif" font-size="11" fill="#475569" letter-spacing="2">POST PREVIEW</text>

  <!-- Profile row -->
  <circle cx="715" cy="148" r="20" fill="url(#avatarGrad)"/>
  <text x="715" y="153" font-family="system-ui,-apple-system,sans-serif" font-size="14" font-weight="700" fill="white" text-anchor="middle">T</text>
  <text x="745" y="143" font-family="system-ui,-apple-system,sans-serif" font-size="14" font-weight="600" fill="#f1f5f9">Tomer Ezri</text>
  <text x="745" y="160" font-family="system-ui,-apple-system,sans-serif" font-size="12" fill="#64748b">Founder · MarkIt</text>

  <!-- Divider -->
  <line x1="700" y1="180" x2="1200" y2="180" stroke="#334155" stroke-width="1"/>

  <!-- Post text lines -->
  <text x="700" y="210" font-family="system-ui,-apple-system,sans-serif" font-size="15" font-weight="700" fill="#f1f5f9">76% of developers abandon AI coding tools</text>
  <text x="700" y="233" font-family="system-ui,-apple-system,sans-serif" font-size="15" font-weight="700" fill="#f1f5f9">within 30 days.</text>

  <text x="700" y="265" font-family="system-ui,-apple-system,sans-serif" font-size="13" fill="#cbd5e1">Not because the tools are bad.</text>
  <text x="700" y="285" font-family="system-ui,-apple-system,sans-serif" font-size="13" fill="#cbd5e1">Because they were adopted wrong.</text>

  <text x="700" y="315" font-family="system-ui,-apple-system,sans-serif" font-size="13" fill="#94a3b8">Stack Overflow 2025: Teams with highest retention</text>
  <text x="700" y="335" font-family="system-ui,-apple-system,sans-serif" font-size="13" fill="#94a3b8">all started the same way — not with autocomplete,</text>
  <text x="700" y="355" font-family="system-ui,-apple-system,sans-serif" font-size="13" fill="#94a3b8">but with code review...</text>

  <!-- Tab strip -->
  <rect x="700" y="390" width="100" height="28" rx="6" fill="#3b82f6"/>
  <text x="750" y="409" font-family="system-ui,-apple-system,sans-serif" font-size="12" font-weight="600" fill="white" text-anchor="middle">Standard</text>
  <rect x="810" y="390" width="100" height="28" rx="6" fill="transparent"/>
  <text x="860" y="409" font-family="system-ui,-apple-system,sans-serif" font-size="12" fill="#64748b" text-anchor="middle">Punchier</text>

  <!-- Divider -->
  <line x1="700" y1="435" x2="1200" y2="435" stroke="#334155" stroke-width="1"/>

  <!-- Quality badges -->
  <rect x="700" y="452" width="116" height="28" rx="14" fill="#052e16" stroke="#166534" stroke-width="1"/>
  <text x="758" y="471" font-family="system-ui,-apple-system,sans-serif" font-size="12" fill="#22c55e" text-anchor="middle">0/10 slop score</text>

  <rect x="826" y="452" width="138" height="28" rx="14" fill="#172554" stroke="#1d4ed8" stroke-width="1"/>
  <text x="895" y="471" font-family="system-ui,-apple-system,sans-serif" font-size="12" fill="#60a5fa" text-anchor="middle">94% voice match</text>

  <rect x="974" y="452" width="82" height="28" rx="14" fill="#052e16" stroke="#166534" stroke-width="1"/>
  <text x="1015" y="471" font-family="system-ui,-apple-system,sans-serif" font-size="12" fill="#22c55e" text-anchor="middle">✓ Expert</text>

  <!-- Char count -->
  <text x="1190" y="471" font-family="system-ui,-apple-system,sans-serif" font-size="11" fill="#475569" text-anchor="end">1,847 / 3,000 chars</text>

  <!-- Card char count line -->
  <rect x="700" y="508" width="490" height="4" rx="2" fill="#1e3a5f"/>
  <rect x="700" y="508" width="301" height="4" rx="2" fill="#3b82f6" opacity="0.6"/>

  <!-- ── FOOTER ── -->
  <line x1="0" y1="598" x2="1280" y2="598" stroke="#1e293b" stroke-width="1"/>
  <text x="60" y="622" font-family="system-ui,-apple-system,sans-serif" font-size="12" fill="#334155">by</text>
  <text x="79" y="622" font-family="system-ui,-apple-system,sans-serif" font-size="12" font-weight="600" fill="#3b82f6">FuzulsFriend</text>
  <text x="1220" y="622" font-family="system-ui,-apple-system,sans-serif" font-size="12" fill="#334155" text-anchor="end">Claude Code Skill · MIT License</text>
</svg>
